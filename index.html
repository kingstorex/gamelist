<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kingstore x steam</title>
    <style>
        /* Modern Dark Theme Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 30px;
        }

        /* Responsive Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Game Card Styling */
        .card {
            background-color: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.6);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 3px solid #3a3a3a;
        }

        .card-content {
            padding: 20px;
        }

        .game-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-stat {
            font-size: 0.95em;
            color: #aaaaaa;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .stat-label {
            font-weight: 600;
            color: #cccccc;
        }

        /* Utility classes */
        .status-message {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2em;
            padding: 20px;
        }
        .error {
            color: #ff5555;
        }
    </style>
</head>
<body>

    <h1>kingstore x steam</h1>
    
    <div class="grid-container" id="games-grid">
        <div class="status-message">Loading games...</div>
    </div>

    <script>
        // Function to render the UI cards
        function renderGames(games) {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = ''; // Clear the loading message

            if (!games || games.length === 0) {
                grid.innerHTML = '<div class="status-message">No games found.</div>';
                return;
            }

            games.forEach(game => {
                // Construct the Steam CDN image URL using the AppID
                const steamImageURL = `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

                // Create the card container
                const card = document.createElement('div');
                card.className = 'card';

                // Notice how hypervisor_bypass and requires_membership are completely omitted from the UI
                card.innerHTML = `
                    <img src="${steamImageURL}" alt="${game.name} Banner" loading="lazy" 
                         onerror="this.src='https://placehold.co/460x215/1e1e1e/FFF?text=Image+Not+Found'">
                    <div class="card-content">
                        <div class="game-title" title="${game.name}">${game.name}</div>
                        
                        <div class="game-stat">
                            <span class="stat-label">AppID:</span>
                            <span>${game.appid}</span>
                        </div>
                        
                        <div class="game-stat">
                            <span class="stat-label">Downloads:</span>
                            <span>${game.downloads}</span>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

                // Function to fetch the local JSON in real-time
        async function fetchLiveGames() {
            const grid = document.getElementById('games-grid');
            
            try {
                // Fetching the local file created by GitHub Actions instead of the live API
                // Add a cache-busting parameter so browsers don't load a stale, cached version
                const response = await fetch('data.json?v=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                renderGames(data);
                
            } catch (error) {
                console.error("Failed to load local data:", error);
                grid.innerHTML = `
                    <div class="status-message error">
                        Waiting for data to generate...<br><br>
                        <small>If you just set up the site, give GitHub Actions a moment to fetch the initial data.</small>
                    </div>`;
            }
        }

    </script>
</body>
</html>
