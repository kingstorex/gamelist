<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kingstore x steam</title>
    <style>
        /* Dark "Steam-like" Theme */
        body {
            font-family: Arial, sans-serif;
            background-color: #1b2838;
            color: #c7d5e0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #games-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background-color: #2a475e;
            border-radius: 8px;
            overflow: hidden;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
        }
        .game-image {
            width: 100%;
            height: 140px; /* Steam header aspect ratio */
            object-fit: cover;
            background-color: #000;
        }
        .game-info {
            padding: 15px;
        }
        .game-title {
            font-size: 1.2em;
            margin: 0 0 10px 0;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-stats {
            font-size: 0.95em;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        .stat-label {
            color: #66c0f4;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>kingstore x steam</h1>
    
    <div id="games-container"></div>

    <script>
        // Points to the data.json file in the same repository
        const dataUrl = 'data.json';

        // Fetch the JSON data
        fetch(dataUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Could not fetch data.json');
                }
                return response.json();
            })
            .then(games => {
                const container = document.getElementById('games-container');

                // Loop through each game in your JSON array
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';

                    // Construct the Steam CDN URL using the appid
                    const imgUrl = `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`;

                    // Populate the card with HTML
                    card.innerHTML = `
                        <img class="game-image" src="${imgUrl}" alt="${game.name} header" loading="lazy" onerror="this.src='https://via.placeholder.com/300x140/000000/FFFFFF?text=No+Image'">
                        <div class="game-info">
                            <h2 class="game-title" title="${game.name}">${game.name}</h2>
                            <div class="game-stats">
                                <span class="stat-label">AppID:</span> 
                                <span>${game.appid}</span>
                            </div>
                            <div class="game-stats">
                                <span class="stat-label">Downloads:</span> 
                                <span>${game.downloads}</span>
                            </div>
                        </div>
                    `;

                    container.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error loading games:', error);
                document.getElementById('games-container').innerHTML = '<p style="color: red; text-align: center;">Error loading games. Please make sure data.json exists in the repository.</p>';
            });
    </script>
</body>
</html>
