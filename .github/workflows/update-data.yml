name: Auto-Update Game Data

on:
  schedule:
    # This cron job runs every hour. You can adjust the timing if needed.
    - cron: '0 * * * *'
  workflow_dispatch: # This allows you to run the action manually from the Actions tab

permissions:
  contents: write # Grants the action permission to commit the new JSON file

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch API and save to data.json
        run: |
          curl -sL https://steamunlockonennabe.duckdns.org/api/onennabe -o data.json

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          # This line checks if data.json actually changed before trying to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update game data" && git push)
