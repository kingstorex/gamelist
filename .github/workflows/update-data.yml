name: Auto-Update Game Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch API, filter unused data, and save to data.json
        run: |
          # Fetch the JSON, pipe it to jq to extract only the necessary fields, and save it
          curl -sL https://steamunlockonennabe.duckdns.org/api/onennabe | jq 'map({name, appid, downloads})' > data.json

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          # This line checks if data.json actually changed before trying to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update and filter game data" && git push)
